<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="user/fragment :: header"></th:block>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
    <h1>User Page</h1>
    <div>
        <form th:action="@{/user/add}" th:object="${user}" method="post">
            <input placeholder="Username" type="text" th:field="*{username}">
            <input placeholder="Password" type="text" th:field="*{password}">
            <input placeholder="Email" type="text" th:field="*{email}">
            <button type="submit">Save</button>
        </form>
    </div>
</body>
</html>
