spring:
  application:
    name: spring-web-demo
  h2:
    console:
      enabled: true

  datasource:
    url: jdbc:h2:./appdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  flyway:
    enabled: true
    Locations: classpath:db/migration
    baseline-on-migrate: true
server:
  port: 8081